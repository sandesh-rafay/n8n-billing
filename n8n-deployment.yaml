apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: rafay-core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: n8n
  template:
    metadata:
      labels:
        app: n8n
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      securityContext:
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
        - name: db-setup
          image: postgres:13-alpine
          securityContext:
            runAsUser: 0
          command:
            - sh
            - -c
            - |
              PGPASSWORD=$DB_POSTGRESDB_PASSWORD psql -h $DB_POSTGRESDB_HOST -U $DB_POSTGRESDB_USER -d postgres -c "CREATE DATABASE n8n;" 2>/dev/null || true
              PGPASSWORD=$DB_POSTGRESDB_PASSWORD psql -h $DB_POSTGRESDB_HOST -U $DB_POSTGRESDB_USER -d postgres -c "CREATE TABLE IF NOT EXISTS n8n_billing_state (key TEXT PRIMARY KEY, value TEXT);" 2>&1
          envFrom:
            - configMapRef:
                name: n8n-config
            - secretRef:
                name: n8n-secret
          env:
            - name: DB_POSTGRESDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pg-secrets
                  key: pg.password
        - name: workflow-importer
          image: registry.dev.rafay-edge.net/rafay/push-events-n8n:latest
          command:
            - sh
            - -c
            - |
              printf '[{"id":"b8d3e4f5-1234-5678-9abc-000000000001","name":"Postgres","type":"postgres","data":{"host":"%s","port":%s,"database":"postgres","user":"%s","password":"%s","ssl":"disable","sshTunnel":false}}]' \
                "${DB_POSTGRESDB_HOST}" "${DB_POSTGRESDB_PORT}" "${DB_POSTGRESDB_USER}" "${DB_POSTGRESDB_PASSWORD}" > /tmp/pg-cred.json
              n8n import:credentials --input=/tmp/pg-cred.json
              n8n import:workflow --input=/home/node/workflows/post-events-workflow.json
          envFrom:
            - configMapRef:
                name: n8n-config
            - secretRef:
                name: n8n-secret
          env:
            - name: DB_POSTGRESDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pg-secrets
                  key: pg.password
      containers:
        - name: n8n
          image: registry.dev.rafay-edge.net/rafay/push-events-n8n:latest
          ports:
            - containerPort: 5678
          envFrom:
            - configMapRef:
                name: n8n-config
            - secretRef:
                name: n8n-secret
          env:
            - name: DB_POSTGRESDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pg-secrets
                  key: pg.password
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5678
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5678
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
