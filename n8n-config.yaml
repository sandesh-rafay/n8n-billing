apiVersion: v1
kind: ConfigMap
metadata:
  name: n8n-config
  namespace: rafay-core
data:
  N8N_HOST: "0.0.0.0"
  N8N_PORT: "5678"
  N8N_SECURE_COOKIE: "false"
  DB_TYPE: "postgresdb"
  DB_POSTGRESDB_HOST: "postgres-admin"
  DB_POSTGRESDB_PORT: "5432"
  DB_POSTGRESDB_DATABASE: "n8n"
  DB_POSTGRESDB_USER: "postgres"
